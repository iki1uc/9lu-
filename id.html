<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Worker-Modus</title>
<style>
  .item { border:1px solid #0f0; padding:4px; margin:4px; font-family:monospace; }
  .mol  { border:1px dashed #0ff; padding:8px; margin:8px; }
</style>
</head>
<body>

<div id="mol-1" class="mol"></div>

<button onclick="buildItem('mol-1', 'on3')">Item: on3</button>
<button onclick="buildItem('mol-1', '3te')">Item: 3te</button>
<button onclick="buildItem('mol-1', '9lu')">Item: 9lu</button>
<button onclick="buildItem('mol-1', '6lar')">Item: 6lar</button>

<script>
// Worker: baut Items in ein Molekül
function buildItem(molId, label) {
  const mol = document.getElementById(molId);
  const item = document.createElement('div');
  item.className = 'item';
  item.textContent = label;
  mol.appendChild(item);
}
</script>

</body>
</html>
